name: Replace tokens action
description: A GitHub action to replace tokens in a file, similar to envsubst
author: Jon LaBelle
branding:
  icon: repeat
  color: green

inputs:
  paths:
    description: >-
      Replacement file path(s).
      Specifies a path to one or more locations.
      Specify multiple paths on separate lines using a multiline string `|`.
      Wildcards are accepted.
      The default location is the current directory (`.`).
      Example: `./path/to/my/settings.json`
    required: false
    default: '.'

  style:
    description: >-
      The style (or format) of the tokens that will be replaced.
      Accepted values are `mustache` (ex: `{{ VARIABLE }}`), `handlebars` (ex: `{{ VARIABLE }}`), `brackets` (ex: `< VARIABLE >`), `double-hashes` (ex: `## VARIABLE ##`), `envsubst` (ex: `${VARIABLE}`), and `make` (ex: `$(VARIABLE)`).
      The default token style is `mustache`.
    required: false
    default: 'mustache'

  filter:
    description: >-
      Filter to qualify the `paths` parameter.
      Only supports `*` and `?` wildcards.
      Example: `*.json`
    required: false

  exclude:
    description: >-
      One or more string items or patterns to be matched, and excluded from the results.
      Wildcard characters are accepted.
      Specify multiple exclusions on separate lines using a multiline string `|`.
      Example: `*dev*.json`
    required: false

  recurse:
    description: >-
      Whether or not to recurse directories.
      The default is `false`, or no directory recursion.
    required: false
    default: 'false'

  depth:
    description: >-
      Depth of directory recursion.
      Only valid if the `recurse` option is enabled.
      There default depth is not set.
    required: false
    default: '0'

  follow-symlinks:
    description: >-
      Whether or not to follow symbolic links.
      The default behavior is not to follow symbolic links.
    required: false
    default: 'false'

  encoding:
    description: >-
      Encoding for file read/write operations.
      The default is `utf8`, without the byte order mark (BOM).
      Acceptable values are: `utf8`, `utf8BOM`, `ascii`, `ansi`, `bigendianunicode`, `bigendianutf32`, `oem`, `unicode`, `utf32`
    required: false
    default: 'utf8'

  no-newline:
    description: >-
      Do not insert a newline at the end of the file.
      The default behavior is to insert a newline at the end of the file.
    required: false
    default: 'false'

  dry-run:
    description: >-
      Run in dry-run mode without modifying files.
      Shows what changes would be made.
      The default behavior is to modify files.
    required: false
    default: 'false'

  fail:
    description: >-
      Fail the step if no files were changed.
      When `dry-run` is enabled, fail the step if no files would be changed.
    required: false
    default: 'false'

  verbose:
    description: >-
      Enable verbose output.
      The default behavior is to suppress verbose output.
    required: false
    default: 'false'

outputs:
  tokens-replaced:
    description: Total number of tokens replaced or that would be replaced in dry-run mode.
    value: ${{ steps.replace-tokens.outputs.tokens-replaced }}
  tokens-skipped:
    description: Total number of tokens skipped because no matching value was available.
    value: ${{ steps.replace-tokens.outputs.tokens-skipped }}
  modified-files-count:
    description: Number of files updated by the action.
    value: ${{ steps.replace-tokens.outputs.modified-files-count }}
  would-modify-files-count:
    description: Number of files that would be updated in dry-run mode.
    value: ${{ steps.replace-tokens.outputs.would-modify-files-count }}

runs:
  using: composite
  steps:
    - id: replace-tokens
      name: Replace tokens (PowerShell Core)
      shell: pwsh
      run: |
        $pathsInput = @'
        ${{ inputs.paths }}
        '@
        $excludeInput = @'
        ${{ inputs.exclude }}
        '@
        $filterInput = @'
        ${{ inputs.filter }}
        '@
        $styleInput = @'
        ${{ inputs.style }}
        '@
        $encodingInput = @'
        ${{ inputs.encoding }}
        '@

        $scriptPath = Join-Path -Path '${{ github.action_path }}' -ChildPath 'Invoke-ReplaceTokens.ps1'
        & $scriptPath `
          -PathsInput $pathsInput `
          -Style $styleInput `
          -Filter $filterInput `
          -ExcludeInput $excludeInput `
          -Recurse '${{ inputs.recurse }}' `
          -Depth '${{ inputs.depth }}' `
          -FollowSymlinks '${{ inputs.follow-symlinks }}' `
          -Encoding $encodingInput `
          -NoNewline '${{ inputs.no-newline }}' `
          -DryRun '${{ inputs.dry-run }}' `
          -Fail '${{ inputs.fail }}' `
          -VerboseInput '${{ inputs.verbose }}'
