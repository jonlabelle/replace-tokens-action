name: Replace tokens action
description: A GitHub Action that replaces tokens in files, similar to envsubst
author: Jon LaBelle
branding:
  icon: repeat
  color: green

inputs:
  paths:
    description: >-
      File path or paths to process.
      Specify multiple paths on separate lines using a multiline string `|`.
      Wildcards are supported.
      Defaults to the current directory (`.`).
      Example: `./path/to/my/settings.json`
    required: false
    default: '.'

  style:
    description: >-
      Token style to replace.
      Accepted values are `mustache` (for example, `{{ VARIABLE }}`), `handlebars` (for example, `{{ VARIABLE }}`), `brackets` (for example, `< VARIABLE >`), `double-hashes` (for example, `## VARIABLE ##`), `envsubst` (for example, `${VARIABLE}`), and `make` (for example, `$(VARIABLE)`).
      Defaults to `mustache`.
    required: false
    default: 'mustache'

  filter:
    description: >-
      Filter applied to the resolved `paths` results.
      Supports only `*` and `?` wildcards.
      Example: `*.json`
    required: false

  exclude:
    description: >-
      File or directory names and patterns to exclude from the results.
      Wildcards are supported.
      Specify multiple exclusions on separate lines using a multiline string `|`.
      Example: `*dev*.json`
    required: false

  recurse:
    description: >-
      Whether to search subdirectories recursively.
      Defaults to `false`.
    required: false
    default: 'false'

  depth:
    description: >-
      Maximum recursion depth.
      Valid only when `recurse` is enabled.
      A value of `0` means no depth limit.
    required: false
    default: '0'

  follow-symlinks:
    description: >-
      Whether to follow symbolic links.
      Defaults to `false`.
    required: false
    default: 'false'

  encoding:
    description: >-
      File encoding to use when reading and writing files.
      Defaults to `auto`, which attempts to preserve the file's existing encoding.
      Accepted values: `auto`, `utf8`, `utf8BOM`, `ascii`, `ansi`, `bigendianunicode`, `bigendianutf32`, `oem`, `unicode`, `utf32`
    required: false
    default: 'auto'

  no-newline:
    description: >-
      Do not append a trailing newline to the file.
      By default, an existing trailing newline is preserved and a newline is
      appended only when the file does not already end with one.
    required: false
    default: 'false'

  dry-run:
    description: >-
      Preview changes without modifying files.
      Shows what would change.
      By default, files are modified.
    required: false
    default: 'false'

  fail:
    description: >-
      Fail the step if no files were changed.
      When `dry-run` is enabled, fail if no files would change.
    required: false
    default: 'false'

  fail-on-skipped:
    description: >-
      Fail the step if one or more tokens are skipped because a matching value
      was missing or empty.
    required: false
    default: 'false'

  verbose:
    description: >-
      Enable verbose output.
      By default, verbose output is suppressed.
    required: false
    default: 'false'

outputs:
  tokens-replaced:
    description: Total number of tokens replaced or that would be replaced in dry-run mode.
    value: ${{ steps.replace-tokens.outputs.tokens-replaced }}
  tokens-skipped:
    description: Total number of tokens skipped because no matching value was available.
    value: ${{ steps.replace-tokens.outputs.tokens-skipped }}
  modified-files-count:
    description: Number of files updated by the action.
    value: ${{ steps.replace-tokens.outputs.modified-files-count }}
  would-modify-files-count:
    description: Number of files that would be updated in dry-run mode.
    value: ${{ steps.replace-tokens.outputs.would-modify-files-count }}

runs:
  using: composite
  steps:
    - id: replace-tokens
      name: Replace tokens (PowerShell Core)
      shell: pwsh
      run: |
        $pathsInput = @'
        ${{ inputs.paths }}
        '@
        $excludeInput = @'
        ${{ inputs.exclude }}
        '@
        $filterInput = @'
        ${{ inputs.filter }}
        '@
        $styleInput = @'
        ${{ inputs.style }}
        '@
        $encodingInput = @'
        ${{ inputs.encoding }}
        '@

        $scriptPath = Join-Path -Path '${{ github.action_path }}' -ChildPath 'Invoke-ReplaceTokens.ps1'
        & $scriptPath `
          -PathsInput $pathsInput `
          -Style $styleInput `
          -Filter $filterInput `
          -ExcludeInput $excludeInput `
          -Recurse '${{ inputs.recurse }}' `
          -Depth '${{ inputs.depth }}' `
          -FollowSymlinks '${{ inputs.follow-symlinks }}' `
          -Encoding $encodingInput `
          -NoNewline '${{ inputs.no-newline }}' `
          -DryRun '${{ inputs.dry-run }}' `
          -Fail '${{ inputs.fail }}' `
          -FailOnSkipped '${{ inputs.fail-on-skipped }}' `
          -VerboseInput '${{ inputs.verbose }}'
