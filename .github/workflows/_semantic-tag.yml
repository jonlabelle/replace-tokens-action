# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Reusable semantic release gate: publish tags, changelog updates, and GitHub releases.

name: Semantic tag

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true

jobs:
  semantic-tag:
    name: Semantic release
    runs-on: ubuntu-latest

    # https://github.com/semantic-release/semantic-release/blob/master/docs/recipes/ci-configurations/github-actions.md
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: 'lts/*'

      - name: Install semantic-release
        working-directory: ${{ runner.temp }}
        run: |
          # Install locally (not globally) so npm `overrides` can pin lodash-es.
          #
          # Workaround: lodash-es@4.18.0 introduced a regression in template.js —
          # it replaced `assignInWith` calls with `assignWith` but omitted the
          # corresponding `import`, causing `ReferenceError: assignWith is not
          # defined` during semantic-release's config verification step
          # (lib/verify.js → template(tagFormat)).
          #
          # Pinning to 4.17.23 (the last working version) via npm `overrides`
          # avoids the bug until lodash-es publishes a fix.
          #
          # References:
          #   https://github.com/lodash/lodash/issues/5984
          #   https://github.com/semantic-release/semantic-release/issues/3847
          printf '{"private":true,"overrides":{"lodash-es":"4.17.23"}}' > package.json
          npm install \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -o pipefail
          # Run the locally installed binary so it resolves plugins from the
          # same node_modules tree that has the lodash-es override applied.
          "$RUNNER_TEMP/node_modules/.bin/semantic-release" --ci 2>&1 | tee "$RUNNER_TEMP/release.log"

      - name: Write release summary
        if: always()
        run: |
          if [ ! -f "$RUNNER_TEMP/release.log" ]; then
            {
              echo '### Release failed'
              echo ''
              echo 'Check the job log for details.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          clean=$(sed 's/\x1b\[[0-9;]*m//g' "$RUNNER_TEMP/release.log")
          version=$(echo "$clean" | grep -oP 'Published release \K\S+' || true)

          if [ -n "$version" ]; then
            tag="$version"
            case "$tag" in
              v*) ;;
              *) tag="v${tag}" ;;
            esac

            edit_url="https://github.com/${GITHUB_REPOSITORY}/releases/edit/${tag}"

            {
              echo "### Released ${version}"
              echo ''
              echo 'GitHub release created successfully.'
              echo ''
              echo '### Manual follow-up'
              echo ''
              echo "Publish this action to GitHub Marketplace by [editing the release](${edit_url}), enabling \`Publish this Action to the GitHub Marketplace\`, and clicking \`Update release\`."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::notice title=Marketplace publish required::Release ${version} is published. Final manual step: edit the release and enable 'Publish this Action to the GitHub Marketplace'."
          elif echo "$clean" | grep -qi 'no relevant changes'; then
            {
              echo '### No release'
              echo ''
              echo 'No relevant changes were detected since the last release.'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo '### Release failed'
              echo ''
              echo 'Check the job log for details.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
