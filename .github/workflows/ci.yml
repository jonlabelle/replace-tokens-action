# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Gated CI pipeline:
#   Gate 1: Lint      - YAML, Markdown, Prettier (parallel)
#   Gate 2: Analyze   - PSScriptAnalyzer, CodeQL (parallel, needs: lint)
#   Gate 3: Test      - Matrix + dry-run tests   (needs: analyze)
#   Gate 4: Release   - Semantic release         (needs: test, push to main only)

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/_lint.yml
    permissions:
      contents: read

  analyze:
    name: Analyze
    needs: lint
    uses: ./.github/workflows/_analyze.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  test:
    name: Test
    needs: analyze
    uses: ./.github/workflows/_test.yml
    permissions:
      contents: read

  release:
    name: Semantic release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: 'lts/*'

      - name: Install semantic-release
        run: >-
          npm install -g
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/exec
          @semantic-release/git
          @semantic-release/release-notes-generator
          @semantic-release/changelog

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -o pipefail
          npx semantic-release --ci 2>&1 | tee /tmp/release.log

      - name: Write release summary
        if: always()
        run: |
          if [ ! -f /tmp/release.log ]; then
            echo '### :x: Release Failed' >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          clean=$(sed 's/\x1b\[[0-9;]*m//g' /tmp/release.log)
          version=$(echo "$clean" | grep -oP 'Published release \K\S+' || true)
          if [ -n "$version" ]; then
            echo "### :package: Released v${version}" >> $GITHUB_STEP_SUMMARY
          elif echo "$clean" | grep -qi 'no relevant changes'; then
            echo '### :white_circle: No Release' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo 'No relevant changes since the last release.' >> $GITHUB_STEP_SUMMARY
          else
            echo '### :x: Release Failed' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo 'Check the job log for details.' >> $GITHUB_STEP_SUMMARY
          fi
