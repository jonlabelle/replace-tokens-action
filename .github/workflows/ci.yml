# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Gated CI pipeline:
#   Gate 1: Lint      - YAML, Markdown, Prettier (parallel)
#   Gate 2: Analyze   - PSScriptAnalyzer, CodeQL (parallel, needs: lint)
#   Gate 3: Test      - Matrix + dry-run tests   (needs: analyze)
#   Gate 4: Release   - Semantic release         (needs: test, push to main only)

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/_lint.yml
    permissions:
      contents: read

  analyze:
    name: Analyze
    needs: lint
    uses: ./.github/workflows/_analyze.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  test:
    name: Test
    needs: analyze
    uses: ./.github/workflows/_test.yml
    permissions:
      contents: read

  semantic-tag:
    name: Semantic release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    uses: ./.github/workflows/_semantic-tag.yml
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
