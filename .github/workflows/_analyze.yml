# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Reusable analysis gate: PSScriptAnalyzer (with SARIF upload) and CodeQL in parallel.

name: Analyze

on:
  workflow_call:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  pwsh:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer
          Install-Module -Name InjectionHunter
          Install-Module -Name ConvertToSARIF

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Import-Module -Name ConvertToSARIF

          $injectionHunterRules = (Get-Module -list InjectionHunter).Path

          $params = @{
            Settings = 'PSScriptAnalyzerSettings.psd1'
            CustomRulePath = $injectionHunterRules
            Path = '.'
            Recurse = $true
            OutVariable = 'issues'
          }

          Invoke-ScriptAnalyzer @params | ConvertTo-SARIF -FilePath results.sarif

          $errors = $issues.Where({$_.Severity -eq 'Error'})
          $warnings = $issues.Where({$_.Severity -eq 'Warning'})

          if ($errors) {
            Write-Error "There were $($errors.Count) errors and $($warnings.Count) warnings total." -ErrorAction Stop
          }
          else {
            Write-Output "There were $($errors.Count) errors and $($warnings.Count) warnings total."
          }

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@main
        if: ${{ always() }}
        with:
          sarif_file: results.sarif

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Initialize CodeQL
        uses: github/codeql-action/init@main
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Auto-build
        uses: github/codeql-action/autobuild@main
        if: ${{ matrix.build-mode == 'autobuild' }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@main
        with:
          category: '/language:${{matrix.language}}'
