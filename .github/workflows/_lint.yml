# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Reusable lint gate: YAML, Markdown, and Prettier format checks in parallel.

name: Lint

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install yamllint
        run: pip install --user yamllint

      - name: Run yamllint
        run: yamllint --config-file .yamllint.yml .

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@main
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            README.md

  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Run Prettier format check
        run: npx prettier --check --log-level log '**.{md,yaml,yml,js,json}'

  summary:
    name: Lint summary
    if: always()
    needs: [yaml, markdown, format]
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          echo '### Lint Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Check | Status |' >> $GITHUB_STEP_SUMMARY
          echo '| ----- | ------ |' >> $GITHUB_STEP_SUMMARY
          echo "| YAML | ${{ needs.yaml.result == 'success' && ':white_check_mark: Pass' || ':x: Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown | ${{ needs.markdown.result == 'success' && ':white_check_mark: Pass' || ':x: Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier | ${{ needs.format.result == 'success' && ':white_check_mark: Pass' || ':x: Fail' }} |" >> $GITHUB_STEP_SUMMARY
